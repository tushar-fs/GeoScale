# GeoScale local dev stack: Kafka (KRaft) + PostgreSQL
#
# Start:  docker compose up -d
# Stop:   docker compose down
# Reset:  docker compose down -v (deletes all data)
# Logs:   docker compose logs -f

services:

  # Single-node Kafka in KRaft mode (no Zookeeper needed).
  # KRaft uses Raft consensus to manage metadata internally.
  kafka:
    image: apache/kafka:latest
    container_name: geoscale-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093

      # Three listeners for different access patterns:
      #   PLAINTEXT          - host machine (localhost:9092)
      #   PLAINTEXT_INTERNAL - other containers (kafka:29092)
      #   CONTROLLER         - KRaft metadata protocol
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL

      # Single-broker overrides (defaults assume 3 brokers)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "Z2Vvc2NhbGUtY2x1c3Rlcg"

    healthcheck:
      test: /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s
    networks:
      - geoscale-net

  postgres:
    image: postgres:16-alpine
    container_name: geoscale-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: geoscale
      POSTGRES_PASSWORD: geoscale
      POSTGRES_DB: geoscale
    volumes:
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U geoscale -d geoscale
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - geoscale-net

  # One-shot container: creates the Kafka topic then exits.
  # Separate container because Kafka has no init-script mechanism like Postgres.
  kafka-init:
    image: apache/kafka:latest
    container_name: geoscale-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./scripts/create-topics.sh:/scripts/create-topics.sh
    entrypoint: ["/bin/bash", "/scripts/create-topics.sh"]
    restart: "no"
    networks:
      - geoscale-net

volumes:
  pgdata:

networks:
  geoscale-net:
    driver: bridge
